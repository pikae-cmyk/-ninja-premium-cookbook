<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ninja Premium Cookbook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__overlay"></div>
    <div class="container hero__content">
      <p class="eyebrow">Ninja Foodi / Airfryer</p>
      <h1>Premium Cookbook</h1>
      <p class="subtitle">Familienrezepte, schnelle Klassiker und mediterrane Ideen – mit Favoriten und smarter Einkaufsliste.</p>
      <div class="hero__actions">
        <a href="#recipes" class="btn btn--primary">Rezepte ansehen</a>
        <a href="#shopping" class="btn btn--ghost">Einkaufsliste</a>
        <button id="showFavoritesTop" class="btn btn--ghost" type="button">Favoriten</button>
      </div>
    </div>
  </header>

  <main class="container app">
    <section class="stats" aria-label="Statistik">
      <article class="stat"><strong id="recipeCount">0</strong><span>Rezepte</span></article>
      <article class="stat"><strong id="favoriteCount">0</strong><span>Favoriten</span></article>
      <article class="stat"><strong id="shoppingCount">0</strong><span>Zutaten in Liste</span></article>
    </section>

    <section class="filters" id="recipes">
      <label>Suche<input id="searchInput" type="search" placeholder="z. B. Pommes, Chicken, Pasta" /></label>
      <label>Land / Küche<select id="countryFilter"></select></label>
      <label>Art der Speise<select id="typeFilter"></select></label>
      <label>Max. Zeit<select id="timeFilter"><option value="all">Alle</option><option value="20">bis 20 Min.</option><option value="30">bis 30 Min.</option><option value="45">bis 45 Min.</option></select></label>
      <button id="resetFilters" class="btn btn--dark" type="button">Filter zurücksetzen</button>
    </section>

    <section class="viewbar">
      <button class="view-btn is-active" data-view="all" type="button">Alle Rezepte</button>
      <button class="view-btn" data-view="favorites" type="button">Favoriten anzeigen</button>
      <button class="view-btn" data-view="shopping" type="button">Einkaufsliste</button>
    </section>

    <section id="emptyState" class="empty" hidden></section>
    <section id="recipeGrid" class="recipe-grid"></section>

    <section id="shopping" class="shopping-panel">
      <div class="section-head">
        <div><p class="eyebrow">Planung</p><h2>Einkaufsliste</h2></div>
        <button id="clearShopping" class="btn btn--ghost-dark" type="button">Liste leeren</button>
      </div>
      <div id="shoppingList" class="shopping-list"></div>
    </section>
  </main>

  <footer class="footer">Ninja Premium Cookbook · GitHub Pages Version</footer>
  <script src="recipes.js"></script>
  <script src="script.js"></script>
</body>
</html>
